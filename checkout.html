<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<script>
let isLoggedIn = localStorage.getItem("isLoggedIn");

if (!isLoggedIn) {
    alert("Please login first!");
    window.location.href = "login.html";
}
</script>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a href="index.html" class="navbar-brand">ShopHub Checkout</a>
    </div>
</nav>

<!-- FORM -->
<div class="container mt-4">
    <h3>Checkout Details</h3>

    <div class="card p-4 mt-3">

        <input type="text" id="name" class="form-control mb-3" placeholder="Full Name">

        <input type="text" id="address" class="form-control mb-3" placeholder="Address">

        <input type="tel" id="phone" class="form-control mb-3"
placeholder="Phone Number"
pattern="[0-9]{10}" maxlength="10">


        <button class="btn btn-success w-100" onclick="placeOrder()">
            Place Order
        </button>

    </div>
</div>

<script>
function placeOrder() {

    let name = document.getElementById("name").value;
    let address = document.getElementById("address").value;
    let phone = document.getElementById("phone").value;

    // CHECK EMPTY FIELDS
    if (!name || !address || !phone) {
        alert("Please fill all details!");
        return;
    }

    // CHECK PHONE VALIDITY
    let phoneRegex = /^[0-9]{10}$/;

    if (!phoneRegex.test(phone)) {
        alert("Enter a valid 10-digit phone number!");
        return;
    }

    localStorage.removeItem("cart");

    alert("🎉 Order placed successfully!");

    window.location.href = "index.html";
}

</script>

</body>
</html>
