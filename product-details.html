<!DOCTYPE html>
<html>
<head>
    <title>Product Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-dark custom-navbar">
    <div class="container">
        <a href="index.html" class="navbar-brand">ShopHub</a>
    </div>
</nav>

<div class="container mt-4">

    <a href="products.html" class="btn btn-secondary mb-3">← Back</a>

    <div id="productDetails" class="row"></div>

</div>

<script src="script.js"></script>

<script>
function loadProductDetails() {

    let params = new URLSearchParams(window.location.search);
    let name = params.get("name");

    let product = products.find(p => p.name === name);

    let container = document.getElementById("productDetails");

    if (!product) {
        container.innerHTML = "<h4>Product not found</h4>";
        return;
    }

    container.innerHTML = `
    <div class="col-md-6">
        <img src="${getProductImage(product.name, product.cat)}"
        style="width:100%; height:300px; object-fit:cover;">
    </div>

    <div class="col-md-6">
        <h2>${product.name}</h2>
        <h4 class="text-primary">${product.price}</h4>

        <p class="mt-3">
            This is a high quality ${product.name}. Perfect for daily use with great performance and durability.
        </p>

        <button class="btn btn-primary mt-3"
        onclick="addToCart('${product.name}', '${product.price}', '${getProductImage(product.name, product.cat)}')">
            Add to Cart
        </button>
    </div>
    `;
}

loadProductDetails();
</script>

</body>
</html>
